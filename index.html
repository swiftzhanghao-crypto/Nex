<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NexOrder AI System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'Helvetica', 'Arial', 'sans-serif'],
            },
            colors: {
              // Apple Color Palette
              primary: '#0071E3', // Apple Blue (Light Mode)
              'primary-dark': '#FF2D55', // Apple Pink (Dark Mode)
              secondary: '#86868B', // Apple Gray Text
              dark: '#1D1D1F', // Apple Black
              canvas: '#F5F5F7', // Apple Light Gray Background
              'canvas-dark': '#000000', // Apple Black Background
              surface: '#FFFFFF', // Card White
              'surface-dark': '#1C1C1E', // Apple Dark Gray Card
            },
            boxShadow: {
              'apple': '0 4px 6px -1px rgba(0, 0, 0, 0.02), 0 2px 4px -1px rgba(0, 0, 0, 0.02)',
              'apple-hover': '0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -2px rgba(0, 0, 0, 0.025)',
              'glass': '0 8px 32px 0 rgba(31, 38, 135, 0.07)',
            }
          }
        }
      }
    </script>
    <style>
      body {
        /* background-color: #F5F5F7;  Handled by Layout component class */
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      /* Custom Scrollbar for a cleaner look */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #D1D1D6;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #aeaeb2;
      }
      
      /* Dark mode scrollbar */
      .dark ::-webkit-scrollbar-thumb {
        background: #3A3A3C;
      }
      .dark ::-webkit-scrollbar-thumb:hover {
        background: #48484A;
      }

      /* Animations */
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes fadeOut {
        from { opacity: 1; transform: translateY(0); }
        to { opacity: 0; transform: translateY(10px); }
      }
      .animate-fade-in {
        animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }
      
      /* Modal Pop-up Animation (Spring-like) */
      @keyframes modalPop {
        0% { opacity: 0; transform: scale(0.96) translateY(15px); }
        100% { opacity: 1; transform: scale(1) translateY(0); }
      }
      .animate-modal-enter {
        animation: modalPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      }

      /* Drawer Slide Animations */
      @keyframes slideInRight {
        from { transform: translateX(100%); }
        to { transform: translateX(0); }
      }
      @keyframes slideOutRight {
        from { transform: translateX(0); }
        to { transform: translateX(100%); }
      }
      
      .animate-drawer-enter {
        animation: slideInRight 0.5s cubic-bezier(0.19, 1, 0.22, 1) forwards;
      }
      .animate-drawer-exit {
        animation: slideOutRight 0.3s ease-in forwards;
      }

      /* Backdrop Animations */
      .animate-backdrop-enter { animation: fadeIn 0.3s ease-out forwards; }
      .animate-backdrop-exit { animation: fadeOut 0.3s ease-in forwards; }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.30.0",
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.554.0",
    "react-router-dom": "https://aistudiocdn.com/react-router-dom@^7.9.6",
    "recharts": "https://aistudiocdn.com/recharts@^3.4.1",
    "@vitejs/plugin-react": "https://aistudiocdn.com/@vitejs/plugin-react@^5.1.1",
    "vite": "https://aistudiocdn.com/vite@^7.2.4"
  }
}
</script>
</head>
  <body class="antialiased bg-[#F5F5F7] dark:bg-black text-[#1D1D1F] dark:text-[#F5F5F7]">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
