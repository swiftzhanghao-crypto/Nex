<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智能查客户 - 客户洞察平台</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.5.0/remixicon.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      corePlugins: { preflight: false },
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', '"PingFang SC"', '"Helvetica Neue"', 'Arial', 'sans-serif'],
          },
        },
      },
    }
  </script>
  <style>
    *, ::before, ::after { box-sizing: border-box; margin: 0; padding: 0; border-width: 0; border-style: solid; border-color: #e5e7eb; }
    html { line-height: 1.5; -webkit-font-smoothing: antialiased; }
    img, svg, video { display: block; max-width: 100%; }
    a { color: inherit; text-decoration: inherit; }
    button, input { font: inherit; color: inherit; }
    button { appearance: none; -webkit-appearance: none; background: transparent; cursor: pointer; }
  </style>
</head>
<body class="min-h-screen bg-gray-50 text-sm leading-normal antialiased font-sans">

<header class="sticky top-0 z-[100] bg-white border-b border-solid border-gray-200">
  <div class="mx-auto max-w-7xl px-6 h-16 flex items-center justify-between">
    <div class="flex items-center">
      <span class="text-xl font-semibold text-teal-600 mr-6 cursor-pointer select-none">客户洞察平台</span>
      <nav class="flex items-center gap-1">
        <a href="./home.html" class="px-5 py-2 rounded-lg text-sm bg-teal-50 text-teal-600 font-medium whitespace-nowrap no-underline block">智能查客户</a>
        <a href="../customer-list/index.html" class="px-5 py-2 rounded-lg text-sm text-gray-600 hover:bg-gray-100 transition-colors whitespace-nowrap no-underline block">客户列表</a>
      </nav>
    </div>
    <div class="flex items-center gap-3">
      <button class="w-10 h-10 flex items-center justify-center rounded-lg text-gray-500 hover:bg-gray-100 hover:text-gray-700 transition-colors">
        <i class="ri-notification-3-line text-xl"></i>
      </button>
      <div class="w-10 h-10 flex items-center justify-center rounded-lg bg-teal-600 text-white text-sm font-semibold cursor-pointer">张</div>
    </div>
  </div>
</header>

<main class="max-w-6xl mx-auto px-4 sm:px-6 pt-16 sm:pt-24 pb-12 sm:pb-16">
  <div class="text-center mb-12">
    <h2 class="text-4xl font-bold text-gray-900 mb-3">智能查客户</h2>
    <p class="text-base sm:text-lg text-gray-500">支持搜索客户全称、客户简称、品牌别名、曾用名、客户编号</p>
  </div>

  <div class="relative">
    <div class="relative">
      <div class="absolute left-5 top-1/2 -translate-y-1/2 w-5 h-5 flex items-center justify-center">
        <i class="ri-search-line text-xl text-gray-400"></i>
      </div>
      <input type="text" placeholder="输入客户全称、客户简称、品牌别名、曾用名或客户编号..." class="w-full h-16 pl-14 pr-24 sm:pr-36 bg-white border-2 border-gray-200 rounded-2xl text-base text-gray-900 placeholder-gray-400 focus:outline-none focus:border-teal-500 transition-all shadow-sm hover:shadow-md cursor-text">
      <div class="absolute right-3 top-1/2 -translate-y-1/2 flex items-center gap-2">
        <button class="px-5 py-2 bg-gradient-to-r from-teal-500 to-teal-600 text-white text-sm font-medium rounded-lg hover:shadow-lg transition-all cursor-pointer whitespace-nowrap">搜索</button>
      </div>
    </div>
  </div>

  <div class="mt-12">
    <div class="flex items-center justify-between mb-5">
      <h3 class="text-lg font-semibold text-gray-900">快捷入口</h3>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4 gap-4">
      <a href="../customer-list/index.html?group=1" class="group bg-white rounded-xl p-5 border border-gray-200/60 hover:shadow-lg transition-all hover:-translate-y-1 no-underline block">
        <div class="w-11 h-11 rounded-lg bg-gradient-to-br from-violet-500 to-violet-600 flex items-center justify-center shadow-sm mb-3">
          <i class="ri-building-4-line text-xl text-white"></i>
        </div>
        <h4 class="text-base font-semibold text-gray-900 mb-1">集团客户</h4>
        <p class="text-2xl font-bold text-gray-900">364</p>
      </a>

      <a href="../customer-list/index.html?reach=1" class="group bg-white rounded-xl p-5 border border-gray-200/60 hover:shadow-lg transition-all hover:-translate-y-1 no-underline block">
        <div class="w-11 h-11 rounded-lg bg-gradient-to-br from-teal-500 to-teal-600 flex items-center justify-center shadow-sm mb-3">
          <i class="ri-checkbox-circle-line text-xl text-white"></i>
        </div>
        <h4 class="text-base font-semibold text-gray-900 mb-1">成交客户</h4>
        <p class="text-2xl font-bold text-gray-900">1,247</p>
      </a>

      <a href="../customer-list/index.html?authorized=1" class="group bg-white rounded-xl p-5 border border-gray-200/60 hover:shadow-lg transition-all hover:-translate-y-1 no-underline block">
        <div class="w-11 h-11 rounded-lg bg-gradient-to-br from-cyan-500 to-cyan-600 flex items-center justify-center shadow-sm mb-3">
          <i class="ri-shield-check-line text-xl text-white"></i>
        </div>
        <h4 class="text-base font-semibold text-gray-900 mb-1">授权覆盖客户</h4>
        <p class="text-2xl font-bold text-gray-900">986</p>
      </a>

      <a href="../customer-list/index.html?top100=1" class="group bg-white rounded-xl p-5 border border-gray-200/60 hover:shadow-lg transition-all hover:-translate-y-1 no-underline block">
        <div class="w-11 h-11 rounded-lg bg-gradient-to-br from-amber-500 to-amber-600 flex items-center justify-center shadow-sm mb-3">
          <i class="ri-award-line text-xl text-white"></i>
        </div>
        <h4 class="text-base font-semibold text-gray-900 mb-1">百强客户</h4>
        <p class="text-2xl font-bold text-gray-900">89</p>
      </a>

      <a href="../customer-list/index.html?listed=1" class="group bg-white rounded-xl p-5 border border-gray-200/60 hover:shadow-lg transition-all hover:-translate-y-1 no-underline block">
        <div class="w-11 h-11 rounded-lg bg-gradient-to-br from-indigo-500 to-indigo-600 flex items-center justify-center shadow-sm mb-3">
          <i class="ri-building-2-line text-xl text-white"></i>
        </div>
        <h4 class="text-base font-semibold text-gray-900 mb-1">上市公司</h4>
        <p class="text-2xl font-bold text-gray-900">312</p>
      </a>

      <a href="../customer-list/index.html?renew=1" class="group bg-white rounded-xl p-5 border border-gray-200/60 hover:shadow-lg transition-all hover:-translate-y-1 no-underline block">
        <div class="w-11 h-11 rounded-lg bg-gradient-to-br from-orange-500 to-orange-600 flex items-center justify-center shadow-sm mb-3">
          <i class="ri-calendar-check-line text-xl text-white"></i>
        </div>
        <h4 class="text-base font-semibold text-gray-900 mb-1">本年应续约客户</h4>
        <p class="text-2xl font-bold text-gray-900">128</p>
      </a>

      <a href="../customer-list/index.html?oppty=1" class="group bg-white rounded-xl p-5 border border-gray-200/60 hover:shadow-lg transition-all hover:-translate-y-1 no-underline block">
        <div class="w-11 h-11 rounded-lg bg-gradient-to-br from-green-500 to-green-600 flex items-center justify-center shadow-sm mb-3">
          <i class="ri-briefcase-4-line text-xl text-white"></i>
        </div>
        <h4 class="text-base font-semibold text-gray-900 mb-1">进行中商机客户</h4>
        <p class="text-2xl font-bold text-gray-900">276</p>
      </a>

      <a href="../customer-list/index.html" class="group bg-white rounded-xl p-5 border border-gray-200/60 hover:shadow-lg transition-all hover:-translate-y-1 no-underline block">
        <div class="w-11 h-11 rounded-lg bg-gradient-to-br from-gray-700 to-gray-800 flex items-center justify-center shadow-sm mb-3">
          <i class="ri-search-eye-line text-xl text-white"></i>
        </div>
        <h4 class="text-base font-semibold text-gray-900 mb-1">全部客户</h4>
        <p class="text-2xl font-bold text-gray-900">12,486</p>
      </a>
    </div>
  </div>

</main>

</body>
</html>
