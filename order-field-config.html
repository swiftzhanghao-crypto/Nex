<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>下单页面字段展示配置</title>
<style>
:root {
  --primary:#4f6ef7; --primary-light:#eef1fe; --primary-hover:#3b5de7;
  --success:#22c55e; --success-light:#f0fdf4;
  --warning:#f59e0b; --warning-light:#fefce8;
  --danger:#ef4444;
  --g50:#f9fafb; --g100:#f3f4f6; --g200:#e5e7eb; --g300:#d1d5db;
  --g400:#9ca3af; --g500:#6b7280; --g600:#4b5563; --g700:#374151;
  --g800:#1f2937; --g900:#111827;
  --r:8px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif;background:var(--g50);color:var(--g800);line-height:1.6}

/* ===== Header ===== */
.app-header{background:#fff;border-bottom:1px solid var(--g200);padding:0 32px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.app-header h1{font-size:18px;font-weight:600;color:var(--g900)}
.header-left{display:flex;align-items:center;gap:12px}
.back-btn{display:none;padding:6px;border:none;background:none;cursor:pointer;color:var(--g500);border-radius:6px}
.back-btn:hover{background:var(--g100);color:var(--g800)}
.back-btn svg{display:block}
.header-actions{display:flex;gap:8px}

/* ===== Buttons ===== */
.btn{padding:7px 16px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--g300);background:#fff;color:var(--g700);transition:all .15s;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.btn:hover{background:var(--g50);border-color:var(--g400)}
.btn-primary{background:var(--primary);color:#fff;border-color:var(--primary)}
.btn-primary:hover{background:var(--primary-hover)}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-text{border:none;background:none;color:var(--primary);padding:4px 8px}
.btn-text:hover{background:var(--primary-light)}

/* ===== Badge ===== */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500;white-space:nowrap}
.badge-blue{background:#dbeafe;color:#1d4ed8}
.badge-amber{background:#fef3c7;color:#92400e}
.badge-green{background:#dcfce7;color:#166534}
.badge-gray{background:var(--g100);color:var(--g600)}
.badge-red{background:#fee2e2;color:#991b1b}

/* ===== Status Dot ===== */
.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px}
.status-dot.on{background:var(--success)}
.status-dot.off{background:var(--g300)}

/* ===== Toggle ===== */
.toggle{position:relative;width:38px;height:20px;display:inline-block;vertical-align:middle}
.toggle input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;inset:0;background:var(--g300);border-radius:10px;cursor:pointer;transition:.2s}
.toggle-slider::before{content:'';position:absolute;width:14px;height:14px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s;box-shadow:0 1px 2px rgba(0,0,0,.1)}
.toggle input:checked+.toggle-slider{background:var(--primary)}
.toggle input:checked+.toggle-slider::before{transform:translateX(18px)}
.toggle input:disabled+.toggle-slider{opacity:.5;cursor:not-allowed}

/* ===== Views ===== */
.view{display:none;padding:24px 32px;min-height:calc(100vh - 56px)}
.view.active{display:block}

/* ===== List View ===== */
.list-toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.list-toolbar h2{font-size:16px;font-weight:600;color:var(--g800)}
.list-meta{display:flex;gap:16px;font-size:13px;color:var(--g500)}
.list-meta span{display:flex;align-items:center;gap:4px}

.list-filters{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.filter-chip{padding:5px 14px;border-radius:16px;font-size:13px;cursor:pointer;border:1px solid var(--g200);background:#fff;color:var(--g600);transition:all .12s}
.filter-chip:hover{border-color:var(--primary);color:var(--primary)}
.filter-chip.active{background:var(--primary);color:#fff;border-color:var(--primary)}

.list-card{background:#fff;border-radius:var(--r);border:1px solid var(--g200);overflow:hidden;box-shadow:0 1px 2px rgba(0,0,0,.03)}
.list-table{width:100%;border-collapse:collapse}
.list-table th{padding:10px 16px;font-size:12px;font-weight:600;color:var(--g400);text-align:left;background:var(--g50);border-bottom:1px solid var(--g200);white-space:nowrap;text-transform:uppercase;letter-spacing:.3px}
.list-table td{padding:12px 16px;font-size:14px;border-bottom:1px solid var(--g100);vertical-align:middle}
.list-table{table-layout:fixed}
.list-table tr:last-child td{border-bottom:none}
.list-table tbody tr{cursor:pointer;transition:background .1s}
.list-table tbody tr:hover td{background:#f8faff}

.order-cell{display:flex;align-items:center;gap:3px;justify-content:center}
.order-btn{width:20px;height:20px;border:1px solid var(--g200);border-radius:4px;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--g400);font-size:10px;transition:all .1s;flex-shrink:0}
.order-btn:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-light)}
.order-num{width:24px;text-align:center;font-size:13px;color:var(--g600);font-weight:500}

.auth-name{font-weight:500;color:var(--g800);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:block}

.config-count{font-size:12px;color:var(--g400)}

.list-table td.td-center{text-align:center}
.list-table th.th-center{text-align:center}

/* ===== Detail View ===== */
.detail-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--g200)}
.detail-header h2{font-size:18px;font-weight:600;color:var(--g900)}
.detail-meta{display:flex;gap:8px;margin-top:6px}
.detail-info{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.info-card{background:#fff;border:1px solid var(--g200);border-radius:var(--r);padding:14px 16px}
.info-card .label{font-size:12px;color:var(--g400);margin-bottom:4px}
.info-card .value{font-size:14px;font-weight:500;color:var(--g800)}

.field-group{margin-bottom:20px}
.field-group-title{font-size:13px;font-weight:600;color:var(--g500);margin-bottom:8px;padding-left:4px;display:flex;align-items:center;gap:6px}
.field-group-title::before{content:'';width:3px;height:14px;background:var(--primary);border-radius:2px}

.cfg-table{width:100%;background:#fff;border-radius:var(--r);border:1px solid var(--g200);overflow:hidden;box-shadow:0 1px 2px rgba(0,0,0,.03)}
.cfg-table table{width:100%;border-collapse:collapse}
.cfg-table th{padding:9px 14px;font-size:11px;font-weight:600;color:var(--g400);text-align:left;background:var(--g50);border-bottom:1px solid var(--g200);white-space:nowrap}
.cfg-table td{padding:10px 14px;font-size:13px;border-bottom:1px solid var(--g100);vertical-align:middle}
.cfg-table tr:last-child td{border-bottom:none}
.cfg-table tr:hover td{background:var(--g50)}
.cfg-table tr.row-disabled td{background:var(--g50)}

.display-tag{display:inline-flex;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500;white-space:nowrap}
.display-tag.fixed{background:#f0fdf4;color:#166534}
.display-tag.show{background:#eff6ff;color:#1e40af}
.display-tag.hide{background:#fee2e2;color:#991b1b}
.display-tag.conditional{background:#fefce8;color:#854d0e}

.display-ctrl{display:flex;flex-direction:column;gap:6px}
.display-select{padding:5px 8px;border:1px solid var(--g200);border-radius:5px;font-size:12px;color:var(--g700);background:#fff;cursor:pointer;min-width:110px;transition:border-color .15s;appearance:auto}
.display-select:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 2px rgba(79,110,247,.08)}
.display-select:disabled{background:var(--g100);cursor:not-allowed;color:var(--g400)}
.display-select option{font-size:13px}
.cond-expr{display:flex;align-items:center;gap:3px;font-size:11px;color:var(--g600);flex-wrap:nowrap;white-space:nowrap}
.cond-expr input{padding:2px 5px;border:1px solid var(--g200);border-radius:3px;font-size:11px;color:var(--g700);background:#fff;width:72px;text-align:center}
.cond-expr input:focus{outline:none;border-color:var(--primary)}
.cond-expr input:disabled{background:var(--g100);color:var(--g400)}

.cfg-input{padding:4px 8px;border:1px solid var(--g200);border-radius:4px;font-size:12px;color:var(--g700);background:#fff;width:100%;max-width:180px;transition:border-color .15s}
.cfg-input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 2px rgba(79,110,247,.08)}
.cfg-input:disabled{background:var(--g100);cursor:not-allowed;color:var(--g400)}

.rule-text{font-size:11px;color:var(--g500);max-width:240px;line-height:1.4}
.restrict-ctrl{display:flex;flex-direction:column;gap:5px}
.restrict-select{padding:4px 6px;border:1px solid var(--g200);border-radius:4px;font-size:12px;color:var(--g700);background:#fff;cursor:pointer;min-width:100px}
.restrict-select:focus{outline:none;border-color:var(--primary)}
.restrict-select:disabled{background:var(--g100);cursor:not-allowed;color:var(--g400)}
.restrict-input{padding:3px 6px;border:1px solid var(--g200);border-radius:4px;font-size:11px;color:var(--g700);background:#fff;width:100%;max-width:160px}
.restrict-input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 2px rgba(79,110,247,.08)}
.restrict-input:disabled{background:var(--g100);color:var(--g400)}
.enum-checks{display:flex;flex-direction:column;gap:4px;margin-top:4px}
.enum-checks label{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--g700);cursor:pointer}
.enum-checks input[type="checkbox"]{accent-color:var(--primary);margin:0}

.default-ctrl{display:flex;flex-direction:column;gap:5px}
.default-select{padding:4px 6px;border:1px solid var(--g200);border-radius:4px;font-size:11px;color:var(--g700);background:#fff;cursor:pointer;min-width:100px}
.default-select:focus{outline:none;border-color:var(--primary)}
.default-select:disabled{background:var(--g100);cursor:not-allowed;color:var(--g400)}
.default-input{padding:3px 6px;border:1px solid var(--g200);border-radius:4px;font-size:11px;color:var(--g700);background:#fff;width:100%;max-width:160px}
.default-input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 2px rgba(79,110,247,.08)}
.default-hint{font-size:10px;color:var(--g400);line-height:1.3}

.validate-ctrl{display:flex;flex-direction:column;gap:5px}
.validate-row{display:flex;align-items:center;gap:3px;font-size:11px;color:var(--g600);white-space:nowrap}
.validate-row input{padding:2px 5px;border:1px solid var(--g200);border-radius:3px;font-size:11px;color:var(--g700);background:#fff;width:68px;text-align:center}
.validate-row input:focus{outline:none;border-color:var(--primary)}

.value-logic{display:flex;flex-direction:column;gap:6px}
.value-logic-row{display:flex;align-items:center;gap:6px;flex-wrap:nowrap}
.value-logic-select{padding:4px 6px;border:1px solid var(--g200);border-radius:4px;font-size:12px;color:var(--g700);background:#fff;cursor:pointer;min-width:90px}
.value-logic-select:focus{outline:none;border-color:var(--primary)}
.value-logic-select:disabled{background:var(--g100);cursor:not-allowed;color:var(--g400)}
.auto-source{padding:4px 6px;border:1px solid var(--g200);border-radius:4px;font-size:11px;color:var(--g700);background:#fff;width:120px;transition:border-color .15s}
.auto-source:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 2px rgba(79,110,247,.08)}
.auto-sub{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--g500);padding-left:2px}
.auto-sub label{cursor:pointer;display:flex;align-items:center;gap:3px;white-space:nowrap}

/* ===== Modal ===== */
.modal-mask{position:fixed;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;z-index:900;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-mask.open{opacity:1;pointer-events:auto}
.modal{background:#fff;border-radius:12px;padding:28px 32px 24px;width:420px;max-width:90vw;box-shadow:0 16px 48px rgba(0,0,0,.18);transform:translateY(20px);transition:transform .25s}
.modal-mask.open .modal{transform:translateY(0)}
.modal h3{margin:0 0 20px;font-size:16px;color:var(--g800)}
.modal-field{margin-bottom:16px}
.modal-field label{display:block;font-size:12px;font-weight:600;color:var(--g500);margin-bottom:5px}
.modal-field input,.modal-field select{width:100%;padding:8px 12px;border:1px solid var(--g200);border-radius:6px;font-size:13px;color:var(--g700);background:#fff;box-sizing:border-box;transition:border-color .15s}
.modal-field input:focus,.modal-field select:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(79,110,247,.1)}
.modal-error{font-size:12px;color:var(--danger);margin-top:4px;min-height:16px}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:20px}

/* ===== Toast ===== */
.toast{position:fixed;bottom:28px;right:28px;background:var(--g800);color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;box-shadow:0 8px 16px rgba(0,0,0,.15);transform:translateY(60px);opacity:0;transition:all .3s;z-index:999}
.toast.show{transform:translateY(0);opacity:1}

/* ===== Empty State ===== */
.empty-hint{text-align:center;padding:60px 20px;color:var(--g400)}
.empty-hint svg{margin-bottom:12px;opacity:.4}
</style>
</head>
<body>

<header class="app-header">
  <div class="header-left">
    <button class="back-btn" id="backBtn" onclick="goBack()">
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    </button>
    <h1 id="pageTitle">下单页面字段展示配置</h1>
  </div>
  <div class="header-actions" id="headerActions">
    <button class="btn" onclick="exportConfig()">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
      导出配置
    </button>
  </div>
</header>

<!-- ===== LIST VIEW ===== -->
<div class="view active" id="listView">
  <div class="list-toolbar">
    <div style="display:flex;align-items:center;gap:12px">
      <h2>授权方式列表</h2>
      <button class="btn btn-primary" onclick="openAddModal()">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
        新增授权
      </button>
    </div>
    <div class="list-meta">
      <span><span class="status-dot on"></span>已启用 <b id="enabledCount">0</b></span>
      <span><span class="status-dot off"></span>已停用 <b id="disabledCount">0</b></span>
      <span>共 <b id="totalCount">0</b> 种</span>
    </div>
  </div>

  <div class="list-filters" id="filters"></div>

  <div class="list-card">
    <table class="list-table">
      <thead>
        <tr>
          <th class="th-center" style="width:8%">顺序</th>
          <th style="width:22%">授权方式</th>
          <th class="th-center" style="width:10%">周期性</th>
          <th class="th-center" style="width:16%">NCC业务类型</th>
          <th class="th-center" style="width:16%">NCC收入类型</th>
          <th class="th-center" style="width:10%">已配置字段</th>
          <th class="th-center" style="width:8%">状态</th>
          <th class="th-center" style="width:10%">操作</th>
        </tr>
      </thead>
      <tbody id="listBody"></tbody>
    </table>
  </div>
</div>

<!-- ===== DETAIL VIEW ===== -->
<div class="view" id="detailView">
  <div id="detailContent"></div>
</div>

<!-- ===== ADD MODAL ===== -->
<div class="modal-mask" id="addModal">
  <div class="modal">
    <h3>新增授权方式</h3>
    <div class="modal-field">
      <label>授权名称 <span style="color:#ef4444">*</span></label>
      <input type="text" id="addName" placeholder="请输入授权名称">
      <div class="modal-error" id="addNameErr"></div>
    </div>
    <div class="modal-field">
      <label>周期性 <span style="color:#ef4444">*</span></label>
      <select id="addPeriod">
        <option value="周期性">周期性</option>
        <option value="非周期性">非周期性</option>
      </select>
    </div>
    <div class="modal-field">
      <label>NCC业务类型 <span style="color:#ef4444">*</span></label>
      <input type="text" id="addNccBiz" placeholder="如：可持续授权、永久性授权">
      <div class="modal-error" id="addNccBizErr"></div>
    </div>
    <div class="modal-field">
      <label>NCC收入类型 <span style="color:#ef4444">*</span></label>
      <input type="text" id="addNccIncome" placeholder="如：授权-数量授权、授权-场地授权">
      <div class="modal-error" id="addNccIncomeErr"></div>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeAddModal()">取消</button>
      <button class="btn btn-primary" onclick="confirmAdd()">确认新增</button>
    </div>
  </div>
</div>

<!-- ===== COPY MODAL ===== -->
<div class="modal-mask" id="copyModal">
  <div class="modal">
    <h3>复制授权方式</h3>
    <input type="hidden" id="copySourceId">
    <div class="modal-field">
      <label>新授权名称</label>
      <input type="text" id="copyName" placeholder="请输入新的授权名称">
      <div class="modal-error" id="copyNameErr"></div>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeCopyModal()">取消</button>
      <button class="btn btn-primary" onclick="confirmCopy()">确认复制</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>

  {id:"user_year",name:"用户年授权",period:"周期性",nccBiz:"可持续授权",nccIncome:"授权-数量授权"},

  {id:"operator",name:"运营商授权",period:"周期性",nccBiz:"可持续授权",nccIncome:"授权-场地授权"},

let state = { filter:'all', authTypes:[] };

function initFieldCfg(f) {
  const dm = f.dt === 'fixed' ? 'fixed' : (f.dt === 'conditional' ? 'conditional' : 'show');
  return {
    displayMode: dm,
    condField: '',
    condValue: '',
    valueMode: 'manual',
    autoSource: '',
    allowManualEdit: false,
    required: ['quantity','authPeriod','subtotal'].includes(f.key),
    defaultType: '',
    defaultValue: '',
    restrictType: '',
    restrictDetail: '',
    enumSelected: [],
    fieldHint: '',
    validateField: '',
    validateKeyword: '',
  };
}

function init() {
  state.authTypes = AUTH_TYPES_DATA.map((at,i) => {
    const fieldCfg = {};
    FIELD_GROUPS.forEach(g => g.fields.forEach(f => {
      fieldCfg[f.key] = initFieldCfg(f);
    }));
    return { ...at, order: i+1, enabled: true, fieldCfg };
  });
  renderFilters();
  renderList();
}

/* ===== Filters ===== */
function renderFilters() {
  const filters = [
    {key:'all',label:'全部'},
    {key:'periodic',label:'周期性'},
    {key:'nonperiodic',label:'非周期性'},
    {key:'enabled',label:'已启用'},
    {key:'disabled',label:'已停用'},
  ];
  document.getElementById('filters').innerHTML = filters.map(f =>
    `<button class="filter-chip ${state.filter===f.key?'active':''}" onclick="setFilter('${f.key}')">${f.label}</button>`
  ).join('');
}

function setFilter(f) {
  state.filter = f;
  renderFilters();
  renderList();
}

function getFiltered() {
  let list = [...state.authTypes];
  if (state.filter==='periodic') list = list.filter(a=>a.period==='周期性');
  if (state.filter==='nonperiodic') list = list.filter(a=>a.period==='非周期性');
  if (state.filter==='enabled') list = list.filter(a=>a.enabled);
  if (state.filter==='disabled') list = list.filter(a=>!a.enabled);
  return list.sort((a,b)=>a.order-b.order);
}

/* ===== List Rendering ===== */
function renderList() {
  const list = getFiltered();
  const enabled = state.authTypes.filter(a=>a.enabled).length;
  const disabled = state.authTypes.length - enabled;
  document.getElementById('enabledCount').textContent = enabled;
  document.getElementById('disabledCount').textContent = disabled;
  document.getElementById('totalCount').textContent = state.authTypes.length;

  if (!list.length) {
    document.getElementById('listBody').innerHTML = `<tr><td colspan="8">
      <div class="empty-hint"><svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2M9 5a2 2 0 0 0 2 2h2a2 2 0 0 0 2-2M9 5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2"/></svg><div>暂无匹配的授权方式</div></div>
    </td></tr>`;
    return;
  }

  document.getElementById('listBody').innerHTML = list.map(at => {
    const periodBadge = at.period==='周期性'
      ? '<span class="badge badge-blue">周期性</span>'
      : '<span class="badge badge-amber">非周期性</span>';
    const nccBizBadge = at.nccBiz
      ? (at.nccBiz==='可持续授权' ? '<span class="badge badge-green">可持续授权</span>' : '<span class="badge badge-gray">永久性授权</span>')
      : '<span style="color:var(--g400)">—</span>';
    const nccIncomeBadge = at.nccIncome
      ? `<span class="badge badge-gray">${at.nccIncome}</span>`
      : '<span style="color:var(--g400)">—</span>';
    const cfgCount = countConfigured(at);
    return `<tr onclick="openDetail('${at.id}')">
      <td class="td-center">
        <div class="order-cell">
          <button class="order-btn" onclick="moveOrder('${at.id}',-1,event)" title="上移">&#9650;</button>
          <span class="order-num">${at.order}</span>
          <button class="order-btn" onclick="moveOrder('${at.id}',1,event)" title="下移">&#9660;</button>
        </div>
      </td>
      <td><span class="auth-name">${at.name}</span></td>
      <td class="td-center">${periodBadge}</td>
      <td class="td-center">${nccBizBadge}</td>
      <td class="td-center">${nccIncomeBadge}</td>
      <td class="td-center"><span class="config-count">${cfgCount}/29</span></td>
      <td class="td-center">
        <label class="toggle" onclick="event.stopPropagation()">
          <input type="checkbox" ${at.enabled?'checked':''}
            onchange="toggleEnabled('${at.id}',this.checked)">
          <span class="toggle-slider"></span>
        </label>
      </td>
      <td class="td-center">
        <button class="btn btn-sm btn-text" onclick="openDetail('${at.id}');event.stopPropagation()">配置</button>
        <button class="btn btn-sm btn-text" style="margin-left:4px" onclick="copyAuthType('${at.id}');event.stopPropagation()">复制</button>
      </td>
    </tr>`;
  }).join('');
}

function countConfigured(at) {
  return Object.values(at.fieldCfg).filter(f=>f.displayMode!=='hide').length;
}

function toggleEnabled(id, val) {
  const at = state.authTypes.find(a=>a.id===id);
  if (at) { at.enabled = val; renderList(); }
}

function moveOrder(id, dir, ev) {
  ev.stopPropagation();
  const sorted = state.authTypes.sort((a,b)=>a.order-b.order);
  const idx = sorted.findIndex(a=>a.id===id);
  const swapIdx = idx + dir;
  if (swapIdx < 0 || swapIdx >= sorted.length) return;
  const tmp = sorted[idx].order;
  sorted[idx].order = sorted[swapIdx].order;
  sorted[swapIdx].order = tmp;
  renderList();
}

/* ===== Detail View ===== */
function openDetail(id) {
  const at = state.authTypes.find(a=>a.id===id);
  if (!at) return;

  document.getElementById('listView').classList.remove('active');
  document.getElementById('detailView').classList.add('active');
  document.getElementById('backBtn').style.display = 'block';
  document.getElementById('pageTitle').textContent = at.name + ' — 字段配置';
  document.getElementById('headerActions').innerHTML = `
    <button class="btn" onclick="resetDetail('${id}')">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 1 2.63 6.37"/><path d="M3 3v9h9"/></svg>
      重置
    </button>
    <button class="btn btn-primary" onclick="saveDetail('${id}')">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
      保存
    </button>`;

  renderDetail(at);
}

function buildRestrictHtml(atId, fKey, fc, disabled, fieldDef) {
  if (disabled) return '<span style="color:var(--g400);font-size:12px">—</span>';
  const hasEnumDefs = fieldDef && fieldDef.enumDefs && fieldDef.enumDefs.length > 0;
  const selNone = fc.restrictType === '' ? 'selected' : '';
  const selNum = fc.restrictType === 'numeric' ? 'selected' : '';
  const selEnum = fc.restrictType === 'enum' ? 'selected' : '';
  let h = `<div class="restrict-ctrl">
    <select class="restrict-select" onchange="updateCfg('${atId}','${fKey}','restrictType',this.value);renderDetail(state.authTypes.find(a=>a.id==='${atId}'))">
      <option value="" ${selNone}>无限制</option>
      <option value="numeric" ${selNum}>数值型限制</option>
      ${hasEnumDefs ? `<option value="enum" ${selEnum}>枚举值限制</option>` : ''}
    </select>`;
  if (fc.restrictType === 'numeric') {
    h += `<input class="restrict-input" type="text" value="${fc.restrictDetail||''}"
      placeholder="如：≥0, 整数, ≤100"
      onchange="updateCfg('${atId}','${fKey}','restrictDetail',this.value)">`;
  }
  if (fc.restrictType === 'enum' && hasEnumDefs) {
    const selected = fc.enumSelected || [];
    h += `<div class="enum-checks">${fieldDef.enumDefs.map(v => {
      const checked = selected.includes(v) ? 'checked' : '';
      return `<label><input type="checkbox" ${checked} onchange="toggleEnumOption('${atId}','${fKey}','${v.replace(/'/g,"\\'")}',this.checked)">${v}</label>`;
    }).join('')}</div>`;
  }
  h += `</div>`;
  return h;
}

function renderDetail(at) {
  const statusBadge = at.enabled ? '<span class="badge badge-green">已启用</span>' : '<span class="badge badge-red">已停用</span>';

  let html = `
    <div class="detail-info" style="grid-template-columns:repeat(5,1fr)">
      <div class="info-card"><div class="label">授权方式</div><div class="value">${at.name}</div></div>
      <div class="info-card"><div class="label">周期属性</div><div class="value">
        <select style="padding:4px 8px;border:1px solid var(--g200);border-radius:5px;font-size:13px;background:#fff;cursor:pointer;width:100%"
          onchange="updateAtProp('${at.id}','period',this.value)">
          <option value="周期性" ${at.period==='周期性'?'selected':''}>周期性</option>
          <option value="非周期性" ${at.period==='非周期性'?'selected':''}>非周期性</option>
        </select></div></div>
      <div class="info-card"><div class="label">NCC业务类型</div><div class="value">
        <input type="text" value="${at.nccBiz||''}" placeholder="请输入" style="padding:4px 8px;border:1px solid var(--g200);border-radius:5px;font-size:13px;width:100%;box-sizing:border-box"
          onchange="updateAtProp('${at.id}','nccBiz',this.value)"></div></div>
      <div class="info-card"><div class="label">NCC收入类型</div><div class="value">
        <input type="text" value="${at.nccIncome||''}" placeholder="请输入" style="padding:4px 8px;border:1px solid var(--g200);border-radius:5px;font-size:13px;width:100%;box-sizing:border-box"
          onchange="updateAtProp('${at.id}','nccIncome',this.value)"></div></div>
      <div class="info-card"><div class="label">状态</div><div class="value">${statusBadge}</div></div>
    </div>`;

  FIELD_GROUPS.forEach(group => {
    html += `<div class="field-group">
      <div class="field-group-title">${group.title}</div>
      <div class="cfg-table"><table>
        <thead><tr>
          <th style="width:9%">字段名称</th>
          <th style="width:14%">展示控制</th>
          <th style="width:16%">赋值逻辑</th>
          <th style="width:4%">必填</th>
          <th style="width:12%">默认值</th>
          <th style="width:13%">填写限制</th>
          <th style="width:12%">字段说明</th>
          <th style="width:20%">下单校验</th>
        </tr></thead><tbody>`;

    group.fields.forEach(f => {
      const fc = at.fieldCfg[f.key];
      const isFixed = f.dt === 'fixed';
      const isCond = f.dt === 'conditional';

      let displayCtrlHtml;
      if (isFixed) {
        displayCtrlHtml = '<span class="display-tag fixed">固定展示</span>';
      } else {
        const selShow = fc.displayMode === 'show' ? 'selected' : '';
        const selHide = fc.displayMode === 'hide' ? 'selected' : '';
        const selCond = fc.displayMode === 'conditional' ? 'selected' : '';
        displayCtrlHtml = `<div class="display-ctrl">
          <select class="display-select" onchange="updateCfg('${at.id}','${f.key}','displayMode',this.value);renderDetail(state.authTypes.find(a=>a.id==='${at.id}'))">
            <option value="hide" ${selHide}>下单不展示</option>
            <option value="show" ${selShow}>下单展示</option>
            <option value="conditional" ${selCond}>条件展示</option>
          </select>`;
        if (fc.displayMode === 'conditional') {
          displayCtrlHtml += `<div class="cond-expr">当字段【<input type="text" value="${fc.condField||''}" placeholder="字段名"
            onchange="updateCfg('${at.id}','${f.key}','condField',this.value)">】=<input type="text" value="${fc.condValue||''}" placeholder="值"
            onchange="updateCfg('${at.id}','${f.key}','condValue',this.value)">时展示</div>`;
        }
        displayCtrlHtml += `</div>`;
      }

      const isHidden = fc.displayMode === 'hide';
      const disabled = isHidden;

      const selManual = fc.valueMode === 'manual' ? 'selected' : '';
      const selAuto = fc.valueMode === 'auto' ? 'selected' : '';
      const selDefault = fc.valueMode === 'default' ? 'selected' : '';
      let valueLogicHtml = `<div class="value-logic">
        <div class="value-logic-row">
          <select class="value-logic-select" ${disabled?'disabled':''} onchange="updateCfg('${at.id}','${f.key}','valueMode',this.value);renderDetail(state.authTypes.find(a=>a.id==='${at.id}'))">
            <option value="manual" ${selManual}>下单录入</option>
            <option value="auto" ${selAuto}>自动取值</option>
            <option value="default" ${selDefault}>取默认值</option>
          </select>`;
      if (fc.valueMode === 'auto') {
        valueLogicHtml += `
          <input class="auto-source" type="text" placeholder="取值字段名" value="${fc.autoSource||''}" ${disabled?'disabled':''}

        </div>
        <div class="auto-sub">
          <label><input type="checkbox" ${fc.allowManualEdit?'checked':''} ${disabled?'disabled':''}
            onchange="updateCfg('${at.id}','${f.key}','allowManualEdit',this.checked)"> 支持人工编辑</label>
        </div>`;
      } else {
        valueLogicHtml += `</div>`;
      }
      valueLogicHtml += `</div>`;

      let defaultValHtml;
      if (disabled) {
        defaultValHtml = '<span style="color:var(--g400);font-size:12px">—</span>';

        const dtVar = fc.defaultType === 'variable' ? 'selected' : '';
        defaultValHtml = `<div class="default-ctrl">
          <select class="default-select" onchange="updateCfg('${at.id}','${f.key}','defaultType',this.value);renderDetail(state.authTypes.find(a=>a.id==='${at.id}'))">
            <option value="" ${dtNone}>无默认值</option>
            <option value="text" ${dtText}>默认文字</option>
            <option value="number" ${dtNum}>默认数字</option>

        if (fc.defaultType === 'text') {
          defaultValHtml += `<input class="default-input" type="text" value="${fc.defaultValue||''}" placeholder="输入默认文字"

        } else if (fc.defaultType === 'number') {
          defaultValHtml += `<input class="default-input" type="number" value="${fc.defaultValue||''}" placeholder="输入默认数字"
            onchange="updateCfg('${at.id}','${f.key}','defaultValue',this.value)">`;
        } else if (fc.defaultType === 'variable') {
          defaultValHtml += `<input class="default-input" type="text" value="${fc.defaultValue||''}" placeholder="如：授权数量为\${quantity}"
            onchange="updateCfg('${at.id}','${f.key}','defaultValue',this.value)">
            <div class="default-hint">用 \${字段名} 引用变量</div>`;
        }
        defaultValHtml += `</div>`;
      }

      html += `<tr class="${isHidden?'row-disabled':''}">
        <td style="font-weight:500;color:${isHidden?'var(--g400)':'var(--g800)'}">${f.name}<div style="font-size:10px;font-weight:400;color:var(--g400);margin-top:2px">${f.key}</div></td>
        <td>${displayCtrlHtml}</td>
        <td>${valueLogicHtml}</td>
        <td><label class="toggle"><input type="checkbox" ${fc.required?'checked':''} ${disabled?'disabled':''}
          onchange="updateCfg('${at.id}','${f.key}','required',this.checked)"><span class="toggle-slider"></span></label></td>
        <td>${defaultValHtml}</td>
        <td>${buildRestrictHtml(at.id, f.key, fc, disabled, f)}</td>
        <td>${disabled
          ? '<span style="color:var(--g400);font-size:12px">—</span>'
          : `<input class="cfg-input" style="max-width:140px" type="text" value="${fc.fieldHint||''}" placeholder="提示文案" maxlength="30"
              onchange="updateCfg('${at.id}','${f.key}','fieldHint',this.value)">`}</td>
        <td>${disabled
          ? '<span style="color:var(--g400);font-size:12px">—</span>'
          : `<div class="validate-ctrl"><div class="validate-row">若字段【<input type="text" value="${fc.validateField||''}" placeholder="字段名"
              onchange="updateCfg('${at.id}','${f.key}','validateField',this.value)">】</div><div class="validate-row">包含【<input type="text" value="${fc.validateKeyword||''}" placeholder="关键词"
              onchange="updateCfg('${at.id}','${f.key}','validateKeyword',this.value)">】</div><div style="font-size:10px;color:var(--danger);margin-top:2px">不允许提交订单</div></div>`}</td>
      </tr>`;
    });
    html += `</tbody></table></div></div>`;
  });

  document.getElementById('detailContent').innerHTML = html;
}

function updateAtProp(atId, prop, val) {
  const at = state.authTypes.find(a=>a.id===atId);
  if (!at) return;
  at[prop] = val;
}

function updateCfg(atId, fieldKey, prop, val) {
  const at = state.authTypes.find(a=>a.id===atId);
  if (!at) return;
  at.fieldCfg[fieldKey][prop] = val;
  if (prop === 'displayMode') {
    if (val === 'hide') {
      at.fieldCfg[fieldKey].condField = '';
      at.fieldCfg[fieldKey].condValue = '';
      at.fieldCfg[fieldKey].valueMode = 'manual';
      at.fieldCfg[fieldKey].autoSource = '';
      at.fieldCfg[fieldKey].allowManualEdit = false;
      at.fieldCfg[fieldKey].required = false;
      at.fieldCfg[fieldKey].defaultType = '';
      at.fieldCfg[fieldKey].defaultValue = '';
      at.fieldCfg[fieldKey].restrictType = '';
      at.fieldCfg[fieldKey].restrictDetail = '';
      at.fieldCfg[fieldKey].enumSelected = [];
      at.fieldCfg[fieldKey].fieldHint = '';
      at.fieldCfg[fieldKey].validateField = '';
      at.fieldCfg[fieldKey].validateKeyword = '';
    }
    if (val !== 'conditional') {
      at.fieldCfg[fieldKey].condField = '';
      at.fieldCfg[fieldKey].condValue = '';
    }
  }
  if (prop === 'valueMode' && (val === 'manual' || val === 'default')) {
    at.fieldCfg[fieldKey].autoSource = '';
    at.fieldCfg[fieldKey].allowManualEdit = false;
  }
  if (prop === 'defaultType') {
    at.fieldCfg[fieldKey].defaultValue = '';
  }
  if (prop === 'restrictType') {
    if (val !== 'numeric' && val !== 'other') at.fieldCfg[fieldKey].restrictDetail = '';
    if (val !== 'enum') at.fieldCfg[fieldKey].enumSelected = [];
  }
}

function toggleEnumOption(atId, fieldKey, val, checked) {
  const at = state.authTypes.find(a => a.id === atId);
  if (!at) return;
  const fc = at.fieldCfg[fieldKey];
  if (!fc.enumSelected) fc.enumSelected = [];
  if (checked) {
    if (!fc.enumSelected.includes(val)) fc.enumSelected.push(val);
  } else {
    fc.enumSelected = fc.enumSelected.filter(v => v !== val);
  }
}

function resetDetail(id) {
  if (!confirm('确定重置该授权方式的所有字段配置？')) return;
  const at = state.authTypes.find(a=>a.id===id);
  if (!at) return;
  FIELD_GROUPS.forEach(g => g.fields.forEach(f => {
    at.fieldCfg[f.key] = initFieldCfg(f);
  }));
  renderDetail(at);
  showToast('已重置「' + at.name + '」的配置');
}

function saveDetail(id) {
  const at = state.authTypes.find(a => a.id === id);
  if (!at) return;
  const errors = [];
  FIELD_GROUPS.forEach(g => g.fields.forEach(f => {
    const fc = at.fieldCfg[f.key];
    if (fc.displayMode === 'hide') return;
    if (!fc.displayMode) {
      errors.push(`「${f.name}」展示控制不能为空`);
    }
    if (fc.displayMode === 'conditional' && (!fc.condField || !fc.condValue)) {
      errors.push(`「${f.name}」条件展示的字段名和条件值不能为空`);
    }
    if (!fc.valueMode) {
      errors.push(`「${f.name}」赋值逻辑不能为空`);
    }
    if (fc.valueMode === 'auto' && !fc.autoSource) {
      errors.push(`「${f.name}」自动取值的来源字段不能为空`);
    }
  }));
  if (errors.length > 0) {
    showValidationErrors(errors);
    return;
  }
  showToast('「' + at.name + '」配置已保存');
}

function showValidationErrors(errors) {
  const list = errors.map(e => `<li>${e}</li>`).join('');
  const mask = document.createElement('div');
  mask.className = 'modal-mask';
  mask.id = 'validationModal';
  mask.innerHTML = `<div class="modal" style="max-width:480px">
    <h3 style="margin:0 0 12px;font-size:16px;color:var(--g800)">保存失败 — 以下配置项不完整</h3>
    <ul style="margin:0;padding:0 0 0 18px;max-height:320px;overflow-y:auto;font-size:13px;color:#b91c1c;line-height:2">${list}</ul>
    <div class="modal-actions" style="margin-top:16px">
      <button class="btn btn-primary" onclick="document.getElementById('validationModal').remove()">知道了</button>
    </div>
  </div>`;
  document.body.appendChild(mask);
}

function goBack() {
  document.getElementById('detailView').classList.remove('active');
  document.getElementById('listView').classList.add('active');
  document.getElementById('backBtn').style.display = 'none';
  document.getElementById('pageTitle').textContent = '下单页面字段展示配置';
  document.getElementById('headerActions').innerHTML = `
    <button class="btn" onclick="exportConfig()">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
      导出配置
    </button>`;
  renderList();
}

/* ===== Util ===== */
/* ===== Add Modal ===== */
function openAddModal() {
  document.getElementById('addName').value = '';
  document.getElementById('addPeriod').value = '周期性';
  document.getElementById('addNccBiz').value = '';
  document.getElementById('addNccIncome').value = '';
  document.getElementById('addNameErr').textContent = '';
  document.getElementById('addNccBizErr').textContent = '';
  document.getElementById('addNccIncomeErr').textContent = '';
  document.getElementById('addModal').classList.add('open');
  setTimeout(() => document.getElementById('addName').focus(), 100);
}

function closeAddModal() {
  document.getElementById('addModal').classList.remove('open');
}

function confirmAdd() {
  const name = document.getElementById('addName').value.trim();
  const period = document.getElementById('addPeriod').value;
  const nccBiz = document.getElementById('addNccBiz').value.trim();
  const nccIncome = document.getElementById('addNccIncome').value.trim();
  const errName = document.getElementById('addNameErr');
  const errBiz = document.getElementById('addNccBizErr');
  const errIncome = document.getElementById('addNccIncomeErr');
  errName.textContent = '';
  errBiz.textContent = '';
  errIncome.textContent = '';

  let valid = true;
  if (!name) { errName.textContent = '请输入授权名称'; valid = false; }
  else if (state.authTypes.some(a => a.name === name)) {
    errName.textContent = '授权名称「' + name + '」已存在，不允许重名'; valid = false;
  }
  if (!nccBiz) { errBiz.textContent = '请输入NCC业务类型'; valid = false; }
  if (!nccIncome) { errIncome.textContent = '请输入NCC收入类型'; valid = false; }
  if (!valid) return;

  const id = 'custom_' + Date.now();
  const maxOrder = state.authTypes.reduce((m, a) => Math.max(m, a.order), 0);
  const fieldCfg = {};
  FIELD_GROUPS.forEach(g => g.fields.forEach(f => {
    fieldCfg[f.key] = initFieldCfg(f);
  }));
  state.authTypes.push({
    id, name, period, nccBiz, nccIncome,
    order: maxOrder + 1, enabled: true, fieldCfg
  });

  closeAddModal();
  renderList();
  showToast('已新增授权方式「' + name + '」');
}

function copyAuthType(id) {
  const src = state.authTypes.find(a => a.id === id);
  if (!src) return;
  document.getElementById('copySourceId').value = id;
  document.getElementById('copyName').value = src.name + '（副本）';
  document.getElementById('copyNameErr').textContent = '';
  document.getElementById('copyModal').classList.add('open');
  setTimeout(() => {
    const inp = document.getElementById('copyName');
    inp.focus();
    inp.select();
  }, 100);
}

function closeCopyModal() {
  document.getElementById('copyModal').classList.remove('open');
}

function confirmCopy() {
  const srcId = document.getElementById('copySourceId').value;
  const name = document.getElementById('copyName').value.trim();
  const errEl = document.getElementById('copyNameErr');
  const src = state.authTypes.find(a => a.id === srcId);
  if (!src) return;

  if (!name) { errEl.textContent = '请输入授权名称'; return; }
  if (state.authTypes.some(a => a.name === name)) {
    errEl.textContent = '授权名称「' + name + '」已存在，不允许重名';
    return;
  }

  const newId = 'copy_' + Date.now();
  const maxOrder = state.authTypes.reduce((m, a) => Math.max(m, a.order), 0);
  const fieldCfg = JSON.parse(JSON.stringify(src.fieldCfg));
  state.authTypes.push({
    id: newId, name, period: src.period,
    nccBiz: src.nccBiz, nccIncome: src.nccIncome,
    order: maxOrder + 1, enabled: true, fieldCfg
  });

  closeCopyModal();
  renderList();
  showToast('已复制「' + src.name + '」为「' + name + '」');
}

function exportConfig() {
  const out = state.authTypes.map(at => ({
    name: at.name, period: at.period, order: at.order,
    enabled: at.enabled, nccBiz: at.nccBiz, nccIncome: at.nccIncome,
    fields: at.fieldCfg,
  }));
  const blob = new Blob([JSON.stringify(out,null,2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'order-field-config.json';
  a.click();
  URL.revokeObjectURL(a.href);
  showToast('配置已导出');
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), 2500);
}

init();
</script>
