llm:
  gateway:
    baseUrl: "https://ai-gateway.example.com"
    chatApi: "/api/v3/chat/completions"
    modelId: "azure/gpt-4.1-mini"
    apiKey: "${LLM_GATEWAY_API_KEY}"
    temperature: 0.2
    topP: 1
    maxCompletionTokens: 2048
    stream: false
    retryCount: 1
    timeoutSec: 60
    uid: "your-uid"
    productName: "your-product"
    intentionCode: "your-intention"

# 建议通过环境变量注入密钥，避免明文提交。
