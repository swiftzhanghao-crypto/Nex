# storage 配置段样板 —— 合并到 server/manifest/config/config.{dev,test,prod}.yaml。
# 规范以 .cursor/skills/file-object-storage/references/implementation-spec.md 的"配置契约"为准。
#
# 统一走 S3 协议：
#   - dev: bbolt-store-s3（本地起的 S3 兼容服务）；保留 root 供 EnsureStorageRoot 建本地目录。
#   - test/prod: MinIO；密钥建议用环境变量 STORAGE_DEFAULT_ACCESS_KEY / STORAGE_DEFAULT_SECRET_KEY 覆盖。
#
# 禁止：
#   - 业务代码直接读写 root 路径（一律走 S3 SDK）。
#   - 把密钥明文提交到仓库。
#   - 把整段 /files 路径列进 user_auth.ignoreAuthPaths。

storage:
  default:
    driver: "s3"
    endpoint: "http://127.0.0.1:9000"   # dev: 本地 bbolt-store-s3；prod: MinIO endpoint
    region: "us-east-1"
    bucket: "it-ai-base"
    accessKey: "minioadmin"             # 生产改由 STORAGE_DEFAULT_ACCESS_KEY 覆盖
    secretKey: "minioadmin"             # 生产改由 STORAGE_DEFAULT_SECRET_KEY 覆盖
    usePathStyle: true                  # MinIO / bbolt-store-s3 建议 true
    presignTTL: "15m"                   # 预签名 URL 有效期；生产建议 <= 1h
    root: "./data/s3"                   # dev: bbolt-store-s3 本地落盘目录；test/prod 可留空或同值

    # 上传守门（可选）
    maxUploadBytes: 20971520            # 20 MB；超过必须走 presign 路径
    allowedMime:                        # 为空表示不过滤；glob 匹配
      - "image/*"
      - "application/pdf"
      - "application/vnd.ms-excel"
      - "application/vnd.openxmlformats-officedocument.*"
      - "text/csv"
      - "text/plain"

    # biz_scope 白名单；不在白名单内的上传请求返回 400
    allowedBizScopes:
      - "customer_attach"
      - "customer_photo"

    # 可选：使用 CDN 公开直读通道时填；不填表示关闭，所有下载走 /files/:id 预签
    publicBaseUrl: ""
